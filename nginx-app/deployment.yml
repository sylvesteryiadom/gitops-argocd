apiVersion: apps/v1
kind: Deployment
metadata:
  name: nicegui
  labels:
    app: nicegui
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nicegui
  template:
    metadata:
      labels:
        app: nicegui
    spec:
      containers:
        - name: nicegui
          image: zauberzeug/nicegui:3.8.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: nicegui
spec:
  selector:
    app: nicegui
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
